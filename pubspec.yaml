    sdk: flutter

  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
