<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A Flutter application for managing notes with Firebase Firestore.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Notes Management App">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Notes Management App</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value of the `--base-href` argument passed to `flutter build`.
    const baseHref = window.location.href.endsWith('/') ? window.location.href : `${window.location.href}/`;
    window.history.replaceState(null, '', baseHref);
  </script>

  <!--
      If you are serving this web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
    -->
  <script>
    window.flutterPlatformChannelReady = true;
  </script>
</head>

<body>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.body.style.opacity = '1';
    });
  </script>
  <script src="flutter.js" defer></script>
</body>

</html>
